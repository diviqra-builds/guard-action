name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          npm install
          npm run build

      - name: Commit dist
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dist/
          git commit -m "build: bundle for ${{ github.ref_name }}" || echo "No changes"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/index.js
          generate_release_notes: true
